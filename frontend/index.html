<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MantleSentry — 智能资金追踪器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <!-- Nav -->
    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-6">
            <a href="/" class="text-lg font-bold text-gray-900">MantleSentry</a>
            <a href="/" class="nav-link active">Dashboard</a>
            <a href="/analysis" class="nav-link">分析</a>
        </div>
        <div class="flex items-center gap-3">
            <input type="text" id="searchBox" placeholder="搜索地址/交易哈希..." 
                   class="border border-gray-300 rounded px-3 py-1.5 text-sm w-64 focus:outline-none focus:border-blue-500">
            <span id="statusDot" class="w-2 h-2 rounded-full bg-gray-400" title="连接状态"></span>
        </div>
    </nav>

    <!-- AI Summary Banner -->
    <div id="summaryBanner" class="bg-blue-50 border-b border-blue-100 px-6 py-3 hidden">
        <p class="text-sm text-blue-800" id="summaryText">加载中...</p>
    </div>

    <!-- Stats Bar -->
    <div class="max-w-7xl mx-auto px-4 pt-4">
        <div class="grid grid-cols-4 gap-3">
            <div class="card px-4 py-3 text-center">
                <div class="stat-label">总交易数</div>
                <div class="stat-value" id="statTxCount">-</div>
            </div>
            <div class="card px-4 py-3 text-center">
                <div class="stat-label">总交易量</div>
                <div class="stat-value" id="statVolume">-</div>
            </div>
            <div class="card px-4 py-3 text-center">
                <div class="stat-label">活跃地址</div>
                <div class="stat-value" id="statAddresses">-</div>
            </div>
            <div class="card px-4 py-3 text-center">
                <div class="stat-label">异常预警</div>
                <div class="stat-value" id="statAlerts">-</div>
            </div>
        </div>
    </div>

    <!-- Main: 2 equal columns -->
    <main class="max-w-7xl mx-auto px-4 py-4">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            
            <!-- Left: Real-time Feed -->
            <div class="card">
                <div class="card-header">
                    <h2 class="font-semibold">实时交易 Feed</h2>
                    <span class="text-xs text-gray-500" id="txCount">0 笔</span>
                </div>
                <div id="txFeed" class="divide-y divide-gray-100 max-h-[520px] overflow-y-auto">
                    <div class="p-4 text-center text-gray-400 text-sm">等待区块数据...</div>
                </div>
            </div>

            <!-- Right: Whale + Alerts stacked -->
            <div class="flex flex-col gap-4">
                <!-- Whale Top 10 -->
                <div class="card flex-1">
                    <div class="card-header">
                        <h2 class="font-semibold">聪明钱 Top 10</h2>
                    </div>
                    <div id="whaleList" class="divide-y divide-gray-100">
                        <div class="p-3 text-center text-gray-400 text-sm">加载中...</div>
                    </div>
                </div>

                <!-- Alerts -->
                <div class="card flex-1">
                    <div class="card-header">
                        <h2 class="font-semibold">异常预警</h2>
                        <span class="badge-red hidden" id="alertBadge">0</span>
                    </div>
                    <div id="alertList" class="divide-y divide-gray-100 max-h-60 overflow-y-auto">
                        <div class="p-3 text-center text-gray-400 text-sm">暂无预警</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/websocket.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
