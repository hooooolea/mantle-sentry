<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MantleSentry — 智能资金追踪器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <!-- ① + ② 整体 sticky 壳：ticker + nav 一起吸顶 -->
    <div class="sticky top-0 z-50">

    <!-- CoinGecko-style 全局数据 Ticker Bar -->
    <div class="stats-ticker">
        <div class="max-w-[1400px] mx-auto px-6 flex items-center gap-1 overflow-x-auto whitespace-nowrap">
            <span class="ticker-item">交易数 <strong id="tickerTx">—</strong></span>
            <span class="ticker-sep">·</span>
            <span class="ticker-item">24h 量 <strong id="tickerVol">—</strong></span>
            <span class="ticker-sep">·</span>
            <span class="ticker-item">活跃地址 <strong id="tickerAddr">—</strong></span>
            <span class="ticker-sep">·</span>
            <span class="ticker-item">Whale 笔 <strong id="tickerWhale">—</strong></span>
            <span class="ticker-sep">·</span>
            <span class="ticker-item ticker-price">MNT <strong id="tickerMntPrice">$0.64</strong></span>
        </div>
    </div>

    <!-- Nav -->
    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <a href="/" class="text-lg font-bold text-gray-900 mr-4">MantleSentry</a>
            <a href="/" class="nav-link active">Dashboard</a>
            <a href="/analysis" class="nav-link">分析</a>
        </div>
        <div class="flex items-center gap-3">
            <input type="text" id="searchBox" placeholder="搜索地址/交易哈希... (Enter)">
            <span id="statusDot" class="w-2.5 h-2.5 rounded-full bg-gray-300" title="连接状态"></span>
        </div>
    </nav>

    </div><!-- /sticky wrapper -->

    <!-- ③ Alert Banner -->
    <div id="alertBanner" class="alert-banner hidden" onclick="document.getElementById('alertSection').scrollIntoView({behavior:'smooth'})">
        <span>⚠</span>
        <span><strong id="alertBannerCount">0</strong> 条新预警，点击查看</span>
    </div>

    <div class="max-w-[1400px] mx-auto px-6 py-5 space-y-5">

        <!-- ④ Stats Cards -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="stat-card">
                <div class="stat-icon stat-icon-indigo">⚡</div>
                <div>
                    <div class="stat-label">总交易数</div>
                    <div class="stat-value" id="statTxCount">—</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-emerald">📊</div>
                <div>
                    <div class="stat-label">总交易量</div>
                    <div class="stat-value" id="statVolume">—</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-blue">👥</div>
                <div>
                    <div class="stat-label">活跃地址</div>
                    <div class="stat-value" id="statAddresses">—</div>
                </div>
            </div>
            <div class="stat-card-alert" onclick="document.getElementById('alertSection').scrollIntoView({behavior:'smooth'})">
                <div class="stat-icon stat-icon-red">🔔</div>
                <div>
                    <div class="stat-label">异常预警</div>
                    <div class="stat-value" id="statAlerts">—</div>
                </div>
            </div>
        </div>

        <!-- ⑤ Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

            <!-- Left: Feed + Alerts -->
            <div class="lg:col-span-2 space-y-5">

                <!-- Feed Card -->
                <div class="card">
                    <div class="card-header">
                        <div class="flex items-center gap-3">
                            <h2 class="font-semibold text-base">实时交易 Feed</h2>
                            <span class="text-xs text-gray-400 font-mono-data" id="txCount">0 笔</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <!-- ⑥ CoinGecko-style 类型筛选 Tab -->
                            <div class="feed-tabs">
                                <button class="feed-tab active" data-filter="all">全部</button>
                                <button class="feed-tab" data-filter="whale">🐋 Whale</button>
                                <button class="feed-tab" data-filter="swap">Swap</button>
                                <button class="feed-tab" data-filter="transfer">转账</button>
                            </div>
                            <button id="pauseBtn" onclick="togglePause()" class="text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:bg-gray-50 text-gray-500 transition-colors">暂停</button>
                        </div>
                    </div>
                    <!-- Table Header -->
                    <div class="table-header grid-cols-12 gap-3">
                        <div class="col-span-2">哈希</div>
                        <div class="col-span-4">路径</div>
                        <div class="col-span-2 text-right">金额</div>
                        <div class="col-span-2">类型</div>
                        <div class="col-span-2 text-right">时间</div>
                    </div>
                    <div id="txFeed" class="max-h-[420px] overflow-y-auto divide-y divide-gray-100">
                        <div class="px-6 py-10 text-center text-gray-400 text-sm">等待区块数据...</div>
                    </div>
                </div>

                <!-- Alerts Card -->
                <div class="card" id="alertSection">
                    <div class="card-header">
                        <h2 class="font-semibold text-base">异常预警</h2>
                        <span class="badge-red hidden" id="alertBadge">0</span>
                    </div>
                    <div id="alertList" class="max-h-[280px] overflow-y-auto divide-y divide-gray-100">
                        <div class="px-6 py-10 text-center text-gray-400 text-sm">暂无预警</div>
                    </div>
                </div>
            </div>

            <!-- Right: Whale Card -->
            <div class="card">
                <div class="card-header">
                    <h2 class="font-semibold text-base">聪明钱 Top 10</h2>
                    <span class="badge">实时</span>
                </div>
                <!-- Table Header -->
                <div class="table-header grid-cols-12 gap-2">
                    <div class="col-span-1">#</div>
                    <div class="col-span-4">地址</div>
                    <div class="col-span-2">类型</div>
                    <div class="col-span-5 text-right">交易量</div>
                </div>
                <div id="whaleList" class="divide-y divide-gray-100">
                    <div class="px-6 py-10 text-center text-gray-400 text-sm">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/websocket.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
