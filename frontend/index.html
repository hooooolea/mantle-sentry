<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MantleSentry — 智能资金追踪器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <!-- Nav -->
    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <a href="/" class="text-lg font-bold text-gray-900 mr-4">MantleSentry</a>
            <a href="/" class="nav-link active">Dashboard</a>
            <a href="/analysis" class="nav-link">分析</a>
        </div>
        <div class="flex items-center gap-3">
            <input type="text" id="searchBox" placeholder="搜索地址/交易哈希... (Enter)">
            <span id="statusDot" class="w-2.5 h-2.5 rounded-full bg-gray-400" title="连接状态"></span>
        </div>
    </nav>

    <!-- Alert Banner -->
    <div id="alertBanner" class="alert-banner hidden" onclick="document.getElementById('alertSection').scrollIntoView({behavior:'smooth'})">
        <span class="font-semibold">⚠ 异常预警</span>
        <span id="alertBannerCount">0</span> 条新预警，点击查看
    </div>

    <div class="max-w-7xl mx-auto px-6 py-5 space-y-5">

        <!-- Stats Bar -->
        <div class="grid grid-cols-4 gap-4">
            <div class="stat-card">
                <div class="stat-label">⚡ 总交易数</div>
                <div class="stat-value" id="statTxCount">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💰 总交易量</div>
                <div class="stat-value" id="statVolume">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">👥 活跃地址</div>
                <div class="stat-value" id="statAddresses">-</div>
            </div>
            <div class="stat-card-alert" onclick="document.getElementById('alertSection').scrollIntoView({behavior:'smooth'})">
                <div class="stat-label">⚠️ 异常预警</div>
                <div class="stat-value" id="statAlerts">-</div>
            </div>
        </div>

        <!-- Main: 3:1 ratio -->
        <div class="grid grid-cols-4 gap-5">
            
            <!-- Feed (3 cols) -->
            <div class="col-span-3 flex flex-col gap-5">
                <div class="card">
                    <div class="card-header">
                        <h2 class="font-semibold">实时交易 Feed</h2>
                        <div class="flex items-center gap-3">
                            <span class="text-xs text-gray-500" id="txCount">0 笔</span>
                            <button id="pauseBtn" onclick="togglePause()" class="text-xs px-2 py-0.5 rounded border border-gray-300 hover:bg-gray-100">暂停</button>
                        </div>
                    </div>
                    <div id="txFeed" class="divide-y divide-gray-100 max-h-[400px] overflow-y-auto">
                        <div class="card-body text-center text-gray-400 text-sm">等待区块数据...</div>
                    </div>
                </div>

                <div class="card" id="alertSection">
                    <div class="card-header">
                        <h2 class="font-semibold">异常预警</h2>
                        <span class="badge-red hidden" id="alertBadge">0</span>
                    </div>
                    <div id="alertList" class="divide-y divide-gray-100 max-h-[260px] overflow-y-auto">
                        <div class="card-body text-center text-gray-400 text-sm">暂无预警</div>
                    </div>
                </div>
            </div>

            <!-- Whale (1 col) -->
            <div class="card">
                <div class="card-header">
                    <h2 class="font-semibold">聪明钱 Top 10</h2>
                </div>
                <div id="whaleList" class="divide-y divide-gray-100">
                    <div class="card-body text-center text-gray-400 text-sm">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/websocket.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
