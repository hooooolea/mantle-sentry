<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地址详情 — MantleSentry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-6">
        <a href="/" class="text-lg font-bold text-gray-900">MantleSentry</a>
        <a href="/" class="nav-link">Dashboard</a>
        <a href="/analysis" class="nav-link">分析</a>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-6 space-y-4">
        <!-- Profile Card -->
        <div class="card">
            <div class="flex items-start justify-between">
                <div>
                    <h1 class="text-lg font-bold" id="addrLabel">地址详情</h1>
                    <p class="text-xs text-gray-500 font-mono mt-1" id="addrHash"></p>
                </div>
                <span id="addrCategory" class="badge">-</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">
                <div><span class="stat-label">累计交易量</span><span class="stat-value" id="addrVolume">-</span></div>
                <div><span class="stat-label">交易笔数</span><span class="stat-value" id="addrTxCount">-</span></div>
                <div><span class="stat-label">盈利评分</span><span class="stat-value" id="addrProfit">-</span></div>
                <div><span class="stat-label">首次活跃</span><span class="stat-value" id="addrFirstSeen">-</span></div>
            </div>
            <div id="addrAiProfile" class="mt-3 text-sm text-gray-600 hidden"></div>
        </div>

        <!-- Tx History -->
        <div class="card">
            <div class="card-header">
                <h2 class="font-semibold">交易历史</h2>
            </div>
            <div id="addrTxList" class="divide-y divide-gray-100">
                <div class="p-4 text-center text-gray-400 text-sm">加载中...</div>
            </div>
        </div>
    </main>

    <script>
        const addr = window.location.pathname.split('/address/')[1];
        if (addr) {
            fetch(`/api/address/${addr}/profile`).then(r=>r.json()).then(d=>{
                if (d.error) return;
                document.getElementById('addrHash').textContent = d.address;
                document.getElementById('addrLabel').textContent = d.label || '地址详情';
                document.getElementById('addrVolume').textContent = '$' + (d.total_volume_usd||0).toLocaleString();
                document.getElementById('addrTxCount').textContent = d.tx_count || 0;
                document.getElementById('addrProfit').textContent = (d.profit_score||0).toFixed(1);
                document.getElementById('addrFirstSeen').textContent = d.first_seen ? new Date(d.first_seen*1000).toLocaleDateString() : '-';
                document.getElementById('addrCategory').textContent = d.category || 'normal';
                if (d.ai_profile) {
                    document.getElementById('addrAiProfile').textContent = d.ai_profile;
                    document.getElementById('addrAiProfile').classList.remove('hidden');
                }
            });
            fetch(`/api/address/${addr}/transactions`).then(r=>r.json()).then(d=>{
                const el = document.getElementById('addrTxList');
                if (!d.transactions?.length) { el.innerHTML = '<div class="p-4 text-center text-gray-400">暂无交易</div>'; return; }
                el.innerHTML = d.transactions.map(tx => `
                    <div class="p-3 hover:bg-gray-50 cursor-pointer" onclick="window.open('https://mantlescan.xyz/tx/${tx.tx_hash}','_blank')">
                        <div class="flex justify-between text-sm">
                            <span class="font-mono text-xs">${tx.tx_hash.slice(0,16)}...</span>
                            <span class="${tx.is_whale_tx ? 'text-red-600 font-semibold' : ''}">${tx.value_native} ${tx.token}</span>
                        </div>
                        <div class="text-xs text-gray-500 mt-1">${tx.tx_type} · ${tx.protocol} · ${new Date(tx.timestamp*1000).toLocaleString()}</div>
                        ${tx.ai_analysis ? `<div class="text-xs text-blue-600 mt-1">${tx.ai_analysis}</div>` : ''}
                    </div>
                `).join('');
            });
        }
    </script>
</body>
</html>
